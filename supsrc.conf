[global]
log_level = "INFO"
# Use simple buffering mode with auto-flush (instead of smart mode)
# Events group together but auto-emit after 500ms window
event_grouping_mode = "simple"
event_buffer_window_ms = 500

[repositories.supsrc]
path = "."
enabled = true

[repositories.supsrc.rule]
type = "supsrc.rules.inactivity"
period = "30s"

[repositories.supsrc.repository]
type = "supsrc.engines.git"