#
# Enhanced Test Configuration for supsrc
# This configuration is designed for testing the TUI with multiple repositories
#

[global]
# Enable debug logging to see everything that's happening
log_level = "DEBUG"

# Global defaults can be overridden by environment variables
# SUPSRC_LOG_LEVEL, SUPSRC_DEFAULT_COMMIT_MESSAGE, etc.

# --- Test Repositories ---
# Multiple repositories with different timer settings for comprehensive testing

[repositories]

  # Repository 1 - Fast timer for quick testing
  [repositories.example-repo-1]
    path = "/tmp/supsrc-example-repo1"
    enabled = true

    [repositories.example-repo-1.rule]
      type = "supsrc.rules.inactivity"
      period = "5s"  # Very fast for testing

    [repositories.example-repo-1.repository]
      type = "supsrc.engines.git"
      commit_message_template = "Auto-commit repo1 [{{save_count}}]: {{change_summary}} ({{timestamp}})"
      auto_push = false

  # Repository 2 - Medium timer
  [repositories.example-repo-2]
    path = "/tmp/supsrc-example-repo2"
    enabled = true

    [repositories.example-repo-2.rule]
      type = "supsrc.rules.inactivity"
      period = "7s"

    [repositories.example-repo-2.repository]
      type = "supsrc.engines.git"
      commit_message_template = "Auto-commit repo2 [{{save_count}}]: {{change_summary}} ({{timestamp}})"
      auto_push = false

  # Repository 3 - Slower timer
  [repositories.example-repo-3]
    path = "/tmp/supsrc-example-repo3"
    enabled = true

    [repositories.example-repo-3.rule]
      type = "supsrc.rules.inactivity"
      period = "10s"

    [repositories.example-repo-3.repository]
      type = "supsrc.engines.git"
      commit_message_template = "Auto-commit repo3 [{{save_count}}]: {{change_summary}} ({{timestamp}})"
      auto_push = true  # Test push functionality
      remote = "origin"
      branch = "main"

  # Repository 4 - Even slower
  [repositories.example-repo-4]
    path = "/tmp/supsrc-example-repo4"
    enabled = true

    [repositories.example-repo-4.rule]
      type = "supsrc.rules.inactivity"
      period = "15s"

    [repositories.example-repo-4.repository]
      type = "supsrc.engines.git"
      commit_message_template = "feat(repo4)[{{save_count}}]: {{change_summary}} at {{timestamp}}"
      auto_push = false

  # Repository 5 - Slowest timer for testing long periods
  [repositories.example-repo-5]
    path = "/tmp/supsrc-example-repo5"
    enabled = true

    [repositories.example-repo-5.rule]
      type = "supsrc.rules.inactivity"
      period = "20s"

    [repositories.example-repo-5.repository]
      type = "supsrc.engines.git"
      commit_message_template = "chore(repo5)[{{save_count}}]: Auto-sync {{change_summary}} {{timestamp}}"
      auto_push = false

  # Repository 6 - Test longer periods
  [repositories.example-repo-6]
    path = "/tmp/supsrc-example-repo6"
    enabled = true

    [repositories.example-repo-6.rule]
      type = "supsrc.rules.inactivity"
      period = "30s"

    [repositories.example-repo-6.repository]
      type = "supsrc.engines.git"
      commit_message_template = "update(repo6): {{change_summary}} - batch {{save_count}} ({{timestamp}})"
      auto_push = false

  # Repository 7 - Minute-long timer for stress testing
  [repositories.example-repo-7]
    path = "/tmp/supsrc-example-repo7"
    enabled = true

    [repositories.example-repo-7.rule]
      type = "supsrc.rules.inactivity"
      period = "60s"

    [repositories.example-repo-7.repository]
      type = "supsrc.engines.git"
      commit_message_template = "bulk(repo7): Long-period commit {{save_count}} - {{change_summary}} ({{timestamp}})"
      auto_push = false

  # Repository 8 - Disabled for testing UI with mixed states
  [repositories.example-repo-8]
    path = "/tmp/supsrc-example-repo8"
    enabled = false  # Test disabled repository display

    [repositories.example-repo-8.rule]
      type = "supsrc.rules.inactivity"
      period = "10s"

    [repositories.example-repo-8.repository]
      type = "supsrc.engines.git"
      auto_push = false

# Note: Additional repositories can be generated by the setup script
# The test_tui.sh script will dynamically generate configurations for any number of repos

# End of configuration