#
# examples/supsrc.conf
#
# supsrc.conf - Example Configuration using Git Engine

# Monitors several 'pyvider' related repositories under ~/code/pyv/
# Each repository commits automatically after 30 seconds of file inactivity.

# Global settings provide defaults if not specified per repository.
# Note: default_commit_message and default_auto_push are now primarily
#       controlled by environment variables (SUPSRC_...) or engine config.
[global]
log_level = "INFO"
# SUPSRC_LOG_LEVEL overrides this.

# --- Repositories to Monitor ---
# Each key under [repositories] is a unique identifier for the monitoring task.
# NOTE: The paths below are examples assuming the glob '~/code/pyv/pyvider*/'
#       expands to these specific directories. You would need to list
#       each actual directory you want to monitor.
[repositories]

  [repositories.pyvider-core]
    # Path to the Git repository. '~' will be expanded to the user's home directory.
    path = "~/code/pyv/pyvider-core"
    enabled = true

    # Trigger configuration: commit after 30 seconds of no file changes.
    [repositories.pyvider-core.rule]
      type = "supsrc.rules.inactivity" # Assuming built-in rule location
      period = "5s" # 30 seconds

    # Repository Engine configuration
    [repositories.pyvider-core.repository]
      type = "supsrc.engines.git" # Specify the Git engine
      # Using engine's default commit message unless SUPSRC_DEFAULT_COMMIT_MESSAGE is set
      # Using engine's default auto_push (false) unless SUPSRC_DEFAULT_AUTO_PUSH is set to true
      # auto_push = false # Explicitly false (default)
      # remote = "origin" # Explicitly set remote (default)
      # branch = "main" # Explicitly set branch (default)

  [repositories.pyvider-schema]
    path = "~/code/pyv/pyvider-schema"
    enabled = true

    [repositories.pyvider-schema.rule]
      type = "supsrc.rules.inactivity"
      period = "3s"

    [repositories.pyvider-schema.repository]
      type = "supsrc.engines.git"
      # Inherits defaults/env vars for commit message and auto_push

  [repositories.pyvider-cli]
    path = "~/code/pyv/pyvider-cli"
    # This repo was previously disabled due to path validation in the logs,
    # keeping it disabled here for consistency with prior state.
    enabled = false # Example: Keep disabled

    [repositories.pyvider-cli.rule]
      type = "supsrc.rules.inactivity"
      period = "10s"

    [repositories.pyvider-cli.repository]
      type = "supsrc.engines.git"
      # Config ignored while disabled=false

  [repositories.pyvider-rpcplugin]
    path = "~/code/pyv/pyvider-rpcplugin"
    enabled = true

    [repositories.pyvider-rpcplugin.rule]
      type = "supsrc.rules.inactivity"
      period = "5s"

    [repositories.pyvider-rpcplugin.repository]
      type = "supsrc.engines.git"
      # Override commit message specifically for this repo
      commit_message_template = "feat(rpc): Auto-sync changes {{timestamp}}"
      # Explicitly enable push for this repo, overriding env var/default
      auto_push = true
      remote = "upstream" # Example: Push to a different remote

  [repositories.pyvider-docs]
    path = "~/code/pyv/pyvider-docs"
    # This repo was previously disabled due to path validation in the logs,
    # keeping it disabled here.
    enabled = false # Example: Keep disabled

    [repositories.pyvider-docs.rule]
      type = "supsrc.rules.inactivity"
      period = "30s"

    [repositories.pyvider-docs.repository]
      type = "supsrc.engines.git"
      # Config ignored while disabled=false

# End of supsrc.conf

# 🔼⚙️
