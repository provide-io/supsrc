name: 🚀 Release

# Release is driven by a user-created GitHub Release (or manual dispatch for dry runs).
# Tag-push auto-release is deliberately not wired up yet — flip when ready.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # Delegate tests + build + (optional) GH release to the ci-tooling reusable.
  # GH release creation is suppressed because `release: published` means one already exists.
  release:
    uses: provide-io/ci-tooling/.github/workflows/python-release.yml@v0.4.2
    permissions:
      contents: write
    with:
      create-github-release: false
      # supsrc's TUI pilot tests use shared Mock state that breaks under pytest-xdist.
      # Disable parallel test execution for release runs until the tests are isolated.
      parallel-tests: false
    secrets: inherit

  # PyPI publish via trusted publisher bound to this repo's release.yml + env `pypi`.
  # TestPyPI publish+verify intentionally omitted — supsrc does not have a TestPyPI
  # trusted publisher configured, and since 0.4.0 already exists on PyPI, TestPyPI
  # dry-run adds no value for this backfill. Restore publish-testpypi + verify-testpypi
  # once test.pypi.org/manage/account/publishing has a publisher for
  # provide-io/supsrc + release.yml + environment `testpypi`.
  publish-pypi:
    needs: release
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/supsrc
    steps:
      - name: 📦 Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-artifacts
          path: dist
      - name: 📤 Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1
        with:
          skip-existing: true

  # Generate SBOM, sign artifacts, attach everything to the GH release.
  sign-and-upload:
    needs: [publish-pypi]
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: 🐍 Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          python-version: "3.11"
      - name: 📦 Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-artifacts
          path: dist
      - name: 🧾 Generate Python SBOM
        run: uvx cyclonedx-py environment --output-format json -o sbom-python.cdx.json
      - name: 🔏 Sigstore sign artifacts
        uses: sigstore/gh-action-sigstore-python@f514d46b907ebcd5bedc05145c03b69c1edd8b46  # v3.0.0
        with:
          inputs: dist/*.whl dist/*.tar.gz
      - name: ⬆️ Attach artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$TAG" dist/*.whl dist/*.tar.gz dist/*.sigstore.json sbom-python.cdx.json --repo "$GITHUB_REPOSITORY" --clobber
